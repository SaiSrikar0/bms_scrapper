name: BookMyShow Hourly Scraper

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab
  repository_dispatch:
    types: [trigger_scrape]

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Chromium Browser
      run: |
        playwright install --with-deps chromium

    - name: Install and configure Cloudflare WARP SOCKS5 Proxy
      run: |
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install cloudflare-warp -y
        # Configure SOCKS5 proxy mode (listens on 127.0.0.1:40000 by default)
        warp-cli --accept-tos mode proxy
        warp-cli --accept-tos registration new
        warp-cli --accept-tos connect
        # Wait for the tunnel connection to establish
        sleep 5
        # Verify proxy configuration
        curl --socks5 127.0.0.1:40000 -s https://www.cloudflare.com/cdn-cgi/trace | grep warp || true

    - name: Run Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python web_scrapper.py --proxy "socks5://127.0.0.1:40000" || true

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # Create seen_slots.json if the scraper didn't produce one (e.g. BMS blocked)
        if [ ! -f seen_slots.json ]; then
          echo '[]' > seen_slots.json
        fi
        git add -f seen_slots.json
        # Commit only if seen_slots.json has changes, to avoid empty commits
        if git diff-index --quiet HEAD -- seen_slots.json; then
          echo "No new time slots changes to commit."
        else
          git commit -m "auto: update seen_slots.json [skip ci]"
          git pull --rebase origin main
          git push origin main
        fi
