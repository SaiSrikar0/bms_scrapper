name: BookMyShow Hourly Scraper

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Chromium Browser
      run: |
        playwright install --with-deps chromium

    - name: Run Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python web_scrapper.py || true

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # Create seen_slots.json if the scraper didn't produce one (e.g. BMS blocked)
        if [ ! -f seen_slots.json ]; then
          echo '[]' > seen_slots.json
        fi
        git add -f seen_slots.json
        # Commit only if seen_slots.json has changes, to avoid empty commits
        if git diff-index --quiet HEAD -- seen_slots.json; then
          echo "No new time slots changes to commit."
        else
          git commit -m "auto: update seen_slots.json [skip ci]"
          git push origin main
        fi
